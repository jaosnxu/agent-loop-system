name: Required Checks

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

env:
  GITHUB_OWNER: jaosnxu
  GITHUB_REPO: agent-loop-system
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: node scripts/gate/auto_check.mjs .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: |
          find scripts -name '*.mjs' -print0 | xargs -0 -n 1 node --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); JSON.parse(require('fs').readFileSync('config/codex.config.json','utf8')); JSON.parse(require('fs').readFileSync('config/github-branch-protection.config.json','utf8'));"
      - run: scripts/state/verify_failure_diagnostics.sh

  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: scripts/worktree/verify_worktree.sh
      - run: scripts/github/verify_pr_continuation.sh

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high
